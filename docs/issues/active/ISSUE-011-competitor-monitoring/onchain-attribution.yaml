# ============================================================
# 机器人过滤策略（分级：硬过滤 vs 软标记）
# ============================================================
robot_filter_policy:
  version: "1.0"
  note: >
    Phase 2 首版采集使用 BundleBear 聚合 API，数据已在上游（Allium）做了基础过滤。
    以下规则用于 Phase 2 后续自建 Dune query 或 RPC 采集时参考，当前版本不在脚本中实现。

  hard_filters:  # 硬过滤：直接排除，不计入统计
    - id: "HF-1"
      rule: "同一 sender 24h 内 > 1000 笔 UserOp"
      reason: "明显自动化脚本或压测"

    - id: "HF-2"
      rule: "callData 为空或仅 0x 的 UserOp"
      reason: "心跳/探针，无实际业务含义"

    - id: "HF-3"
      rule: "已知 wifi_map 等批量工厂产生的账户"
      reason: "非目标供应商，会严重污染数据"

  soft_markers:  # 软标记：保留数据但打标签，供分析时参考
    - id: "SM-1"
      rule: "同一 sender 1min 内 > 10 笔 UserOp"
      reason: "可能是机器人，但也可能是批量操作的正常用户"

    - id: "SM-2"
      rule: "Smart Account 创建后 24h 内的 UserOp"
      reason: "可能是测试/部署，但也可能是新用户立即使用"

    - id: "SM-3"
      rule: "仅与同一目标合约交互且无资金流动"
      reason: "可能是自动化脚本，但也可能是特定 DApp 的正常使用"

# ============================================================
# 调研总结
# ============================================================
research_summary:
  total_providers: 6
  trackable_providers: 1  # 仅 Coinbase 有可验证的专属工厂地址
  partially_trackable: 1  # Crossmint（使用 ZeroDev Kernel 通用工厂，可追踪但归因不精确）
  not_trackable: 4        # Privy（paymaster 由开发者自配）、BNB Chain MCP、MoonPay、Minara

  key_findings:
    - finding: "Coinbase Smart Wallet 是唯一有完全可验证工厂地址的供应商"
      confidence: high
      details: >
        两个工厂地址（v1.0 和 v1.1）均来自官方 GitHub 仓库，
        在 Etherscan 上已验证源码，BundleBear 社区标签确认归属。

    - finding: "Privy 不部署自有工厂，复用第三方工厂，且 paymaster/bundler/EIP-7702 均无法归因"
      confidence: high
      details: >
        Privy 文档明确列出 6 种底层实现供开发者选择，
        链上无法区分 Privy 创建的钱包与直接使用底层 SDK 创建的钱包。
        ISSUE-013 进一步调研确认：paymaster/bundler 由开发者自配（无统一地址），
        Native Gas Sponsorship 地址未公开，两条路径均确认不可行。
        EIP-7702 概率归因 5 条路径全部失败（impl 地址被多家共享，签名在链下完成）。

    - finding: "Crossmint 使用 ZeroDev Kernel 工厂，factory + bundler 组合可精准归因（测试网已验证）"
      confidence: high
      details: >
        ISSUE-012 两阶段反查：Phase 1 确认 factory = 0xd703aae... (zerodev_kernel)，
        Phase 2 发现 Crossmint 专用 bundler 0xb052d584... 与该 factory 100% 一对一绑定。
        测试网精准归因公式：factory + bundler = Crossmint（high confidence）。
        主网 factory 已确认存在（CREATE2），但 bundler 地址不同（mainnet nonce=1），
        需通过 mainnet bundler 分布分析找到 Crossmint mainnet bundler 才能完成主网归因。
        Validator module (0x845adb2c...) 是 ZeroDev 标准组件（4 条链同 bytecode），已排除为归因条件。

    - finding: "BundleBear 是最权威的 ERC-4337 工厂归因数据源"
      confidence: high
      details: >
        开源项目，维护 59 个已标注工厂地址（22 个供应商），
        提供每周账户激活数据按工厂分组。可直接用于 Phase 2。

    - finding: "EIP-7702 调研发现 Coinbase Wallet 有专属 7702 impl，可补充 ERC-4337 工厂数据"
      confidence: high
      details: >
        Coinbase Wallet 7702 impl (0x7702cb55...) 拥有 50.6 万账户，专属地址可确定性归因。
        BundleBear 已追踪此地址。可纳入 Phase 2 链上采集，与 ERC-4337 factory 数据互补。
        其他竞品（MetaMask 69.8万/Bitget 86.9万/TrustWallet 34.7万/Ambire 50.8万）均有专属 impl。

    - finding: "BundleBear 同时是 ERC-4337 和 EIP-7702 最权威的归因数据源"
      confidence: high
      details: >
        开源项目，维护 59 个 ERC-4337 工厂地址标签（22 个供应商），
        同时建立了独立的 EIP-7702 追踪体系ﾈ8 链覆盖、authorized contract 标签、
        authorizations/actions/metrics/state 4 层数据）。可直接用于 Phase 2。
