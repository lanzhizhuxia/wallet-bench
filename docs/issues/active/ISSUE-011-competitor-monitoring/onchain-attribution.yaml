    # ----------------------------------------------------------
    # Crossmint
    # ----------------------------------------------------------
    crossmint:
      trackable: partial
      architecture: smart_wallet
      underlying_factory: zerodev_kernel
      reason: >
        ISSUE-012 反查结论：Crossmint 使用 ZeroDev Kernel 工厂部署 ERC-7579 模块化智能账户。
        工厂地址 0xd703aae79538628d27099b8c4f621be4ccd142d5 在 BundleBear 社区标签库中已标注为
        zerodev_kernel。链上无法区分 Crossmint 来源与直接使用 ZeroDev Kernel 的其他应用
        （如 ZeroDev SDK 用户、其他基于 Kernel 的 WaaS）。
      chains:
        - chain: base-sepolia
          factory_addresses:
            - address: "0xd703aae79538628d27099b8c4f621be4ccd142d5"
              label: zerodev_kernel
              source: "ISSUE-012：通过 wallet-bench 测试钱包反查 EntryPoint v0.7 AccountDeployed 事件"
              verified: true
              verification_details: >
                1. wallet-bench 运行 Crossmint adapter 创建测试钱包 0x490E6A6c74bfd538083938A108098c1c47eAa6E9
                2. 查询 EntryPoint v0.7 (0x0000000071727de22e5e9d8baf0edac6f37da032) 的 AccountDeployed 事件
                3. Block 38482363，TX 0x430bcd0add8d5b6ef10d2b46c68992c1fd77dc9f005a4dd82bdc5b9b5a2de379
                4. AccountDeployed 事件 data 字段解码得到 factory = 0xd703aae79538628d27099b8c4f621be4ccd142d5
                5. BundleBear 标签库确认该地址归属 zerodev_kernel
                6. 部署交易日志包含 ModuleInstalled 事件，确认 ERC-7579 模块化架构
      entrypoint: "0x0000000071727de22e5e9d8baf0edac6f37da032"  # EntryPoint v0.7（非 v0.6）
      validator_module: "0x845adb2c711129d4f3966735ed98a9f09fc4ce57"
      investigation_log:
        - date: "2026-03-06"
          scope: "ISSUE-012 Crossmint 链上工厂合约反查"
          methods_tried:
            - "wallet-bench Crossmint adapter 创建 Base Sepolia 测试钱包"
            - "Base Sepolia RPC eth_getLogs 查询 EntryPoint v0.7 AccountDeployed 事件"
            - "BundleBear 工厂标签库交叉验证"
            - "部署交易日志事件分析（ModuleInstalled / AccountDeployed）"
          findings:
            - >
              测试钱包 0x490E6A6c74bfd538083938A108098c1c47eAa6E9 于 Block 38482363 部署，
              factory = 0xd703aae79538628d27099b8c4f621be4ccd142d5（BundleBear 标签：zerodev_kernel）。
            - >
              Crossmint 使用 EntryPoint v0.7（0x0000000071727de22e5e9d8baf0edac6f37da032），
              而非 v0.6（0x5FF137D4...）。钱包是 ERC-1967 升级代理合约（61 bytes，含 implementation slot）。
            - >
              Validator 模块地址 0x845adb2c711129d4f3966735ed98a9f09fc4ce57，
              出现在 UserOp nonce key 和 ModuleInstalled 事件中，推测为 ECDSA Validator。
            - >
              Paymaster 为零地址（无 gas 赞助），bundler 地址为 0xb052d58410a2c54e27d3d62f99bf8b2bb27a8d23。
            - >
              由于 ZeroDev Kernel 是通用工厂，在 BundleBear 中有 7 个已知地址，
              无法仅凭 factory 区分 Crossmint 来源。但可结合 validator module 或 bundler 地址辅助归因。
          conclusion: >
            Crossmint 使用 ZeroDev Kernel 工厂，链上归因为 partial：
            能追踪到 Kernel 工厂级别，但无法精确区分 Crossmint 与其他 Kernel 用户。
            如需精确归因，需进一步研究 Crossmint 专用的 validator module 或 bundler 地址是否具有唯一性。
      notes: >
        Crossmint 底层使用 ZeroDev Kernel（ERC-7579 模块化智能账户框架）。
        工厂地址在测试网（Base Sepolia）已验证，mainnet 是否使用相同地址需进一步确认
        （CREATE2 确定性部署通常保持跨链/跨网一致）。
        潜在的精确归因路径：
        1) Crossmint bundler 地址（0xb052d584...）如果在 mainnet 上也使用同一地址，可作为辅助过滤条件
        2) Crossmint validator module（0x845adb2c...）如果是 Crossmint 定制的，可作为更精确的归因依据
        3) Crossmint 使用 EntryPoint v0.7，而非更常见的 v0.6，这本身可缩小候选范围
      sources:
        - url: "https://docs.crossmint.com/wallets/architecture"
          description: "确认 ERC-4337 + ERC-7579 架构"
        - url: "https://sepolia.basescan.org/tx/0x430bcd0add8d5b6ef10d2b46c68992c1fd77dc9f005a4dd82bdc5b9b5a2de379"
          description: "钱包部署交易（Base Sepolia Block 38482363）"
        - url: "https://github.com/Jam516/BundleBear/blob/main/models/erc4337/labels/erc4337_labels_factories.sql"
          description: "BundleBear 工厂标签库，确认 0xd703aae... = zerodev_kernel"

