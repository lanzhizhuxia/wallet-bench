        理论上在 248 条链上使用相同地址。v1.0 和 v1.1 均使用 EntryPoint v0.6。
        AgentKit 的 cdpSmartWalletProvider 通过 CDP API 创建 Smart Account，
        底层使用相同的 CoinbaseSmartWalletFactory，不含独立工厂地址。
        AgentKit 支持的网络：base, ethereum, polygon, arbitrum, optimism（+ 对应测试网）。
        在 BundleBear 数据中，coinbase_smart_wallet 周活跃账户在 2025 年底持续增长，
