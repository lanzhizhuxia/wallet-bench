# ============================================================
# 链上归因规则 — WaaS 供应商工厂合约地址清单
# 用途：Phase 2 链上数据采集，按 factory 地址归因 UserOps 到供应商
# ============================================================

attribution_rules:
  entry_point: "0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789"  # ERC-4337 EntryPoint v0.6（各链固定）

  providers:
    # ----------------------------------------------------------
    # Privy
    # ----------------------------------------------------------
    privy:
      trackable: false
      architecture: smart_wallet
      reason: >
        Privy 本身不部署工厂合约，而是作为中间层让开发者在 Dashboard 中选择底层 Smart Wallet 实现。
        支持的底层实现包括：Coinbase Smart Wallet、ZeroDev Kernel、Alchemy Light Account、
        Safe、Biconomy、Thirdweb。不同 Privy 客户可能使用不同的底层工厂，因此链上 UserOps
        会归因到底层工厂（如 coinbase_smart_wallet），而非 Privy 本身。
        无法从链上数据单独区分"经 Privy 创建"的钱包与"直接使用底层 SDK 创建"的钱包。
        此外，Privy 的 Gas Sponsorship 也无法用于链上归因：Smart Wallet 路径的 bundlerUrl/paymasterUrl
        由开发者在 Privy Dashboard 自行配置（Pimlico/ZeroDev/Alchemy/Biconomy/Coinbase），无统一专属地址；
        Native Gas Sponsorship（EIP-7702）虽由 Privy 后端处理，但 paymaster 地址未公开。
      investigation_log:
        - date: "2026-03-06"
          scope: "ISSUE-013 Privy Paymaster / Bundler 足迹调研"
          methods_tried:
            - "Privy 官方文档（gas sponsorship、smart wallets、native sponsorship）"
            - "@privy-io/react-auth@3.16.0 SDK 源码反编译（bundler/paymaster provider 检测逻辑）"
            - "Privy Go SDK e2e 测试代码（paymaster 地址验证）"
            - "wallet-bench Privy adapter 实现分析"
          findings:
            - >
              Smart Wallet 路径：bundlerUrl/paymasterUrl 从 Privy API 下发
              （smart_wallet_config.configured_networks[].bundler_url/paymaster_url），
              由开发者在 Dashboard 自行选择 provider（Pimlico/ZeroDev/Alchemy/Biconomy/Coinbase），
              无 Privy 专属统一地址。默认 Bundler 为公共 Pimlico（https://public.pimlico.io/v2/{chainId}/rpc）。
            - >
              Native Gas Sponsorship（EIP-7702 + Kernel 智能合约，2025-Q4 新功能）：
              Privy 后端处理 paymaster，但文档仅提及 "Paymasters partnered with Privy"，
              未公开任何合约地址。
            - >
              Go SDK 测试中发现地址 0x2cc0c7981D846b9F2a16276556f6e8cb52BfB633，
              经验证为 Alchemy Verifying Paymaster（Sepolia 测试网），非生产环境、非 Privy 专属。
            - >
              SDK 源码内嵌 5 家 provider 域名检测逻辑（Pimlico/ZeroDev/Alchemy/Biconomy/Coinbase），
              用于 bundler/paymaster URL 识别，但不含任何硬编码 paymaster 合约地址。
            - >
              wallet-bench 的 Privy adapter（adapters/privy.py）使用 REST API /wallets + /wallets/{id}/rpc，
              调用 eth_sendTransaction，不走 ERC-4337 UserOp 路径，因此无 paymaster 足迹。
          conclusion: >
            两条路径均无法归因：Smart Wallet paymaster 由开发者自配，Native Sponsorship 地址未公开。
            确认链上无可识别足迹，不再投入时间。
      notes: >
        如果 Privy 客户选择 Coinbase Smart Wallet，其钱包会通过 CoinbaseSmartWalletFactory
        部署，在链上表现为 coinbase_smart_wallet 而非 privy。
        Privy 文档 (docs.privy.io) 不公开任何 Privy 专属的工厂合约地址。
        底层实现类型可通过 SDK 的 smartWallet.type 属性获取：
        'safe', 'kernel', 'light_account', 'biconomy', 'thirdweb', 'coinbase_smart_wallet'。
      sources:
        - url: "https://docs.privy.io/wallets/using-wallets/evm-smart-wallets/overview"
          description: "Privy Smart Wallets 概览，列出 6 种底层实现"
        - url: "https://docs.privy.io/wallets/using-wallets/evm-smart-wallets/setup/configuring-dashboard"
          description: "Dashboard 配置页，确认无默认实现，需手动选择"
        - url: "https://docs.privy.io/wallets/using-wallets/evm-smart-wallets/gas"
          description: "Gas Sponsorship 文档，确认 paymaster 由开发者配置"
        - url: "https://docs.privy.io/wallets/using-wallets/evm-smart-wallets/native-gas-sponsorship"
          description: "Native Gas Sponsorship（EIP-7702），paymaster 地址未公开"
        - url: "https://www.npmjs.com/package/@privy-io/react-auth"
          description: "SDK 源码分析：内嵌 5 家 bundler/paymaster provider 域名检测"
    # ----------------------------------------------------------
