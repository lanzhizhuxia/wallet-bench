            - "Bundler 0xb052d584... 反向分析：其所有 AccountDeployed 交易的 factory 分布"
            - "Validator 0x845adb2c... 多链存在性检查（ETH/Base/Arbitrum/Optimism）"
            - "Validator function selector 分析（IValidator/IModule ERC-7579 接口匹配）"
          findings:
            - "测试网 bundler 0xb052d584... 占 67.1%，且 100% 只用此 factory（一对一绑定）"
            - "Validator 0x845adb2c... 在 4 链同 bytecode，ZeroDev 标准 ECDSA Validator，不可归因"
          conclusion: "测试网精准归因可行（factory + bundler），validator 排除"
        - date: "2026-03-06"
          scope: "ISSUE-012 Phase 3：五链主网验证（Etherscan V2 API）"
          methods_tried:
            - "Etherscan V2 API 查询 5 链（Base/ETH/ARB/OP/Polygon）EntryPoint v0.7 AccountDeployed 事件"
            - "每链抽样 30-100 笔交易统计 bundler 分布"
            - "Factory 在 5 链的 eth_getCode 存在性验证"
            - "EntryPoint v0.6 vs v0.7 factory 全景分析（Base mainnet）"
          findings:
            - >
              Factory 0xd703aae... 在 5 条主网均存在（CREATE2 一致），且是 EP v0.7 最大 Kernel 工厂实例：
              OP 94%, ARB 80%, ETH 58%, Base 52%, Polygon 44%。
            - >
              主网 bundler 100% 为 Pimlico（0x4337... 前缀），Crossmint 生产环境使用 Pimlico bundler 服务。
              测试网 bundler 0xb052d584... 在 Base mainnet nonce=1，确认生产环境用不同基础设施。
            - >
              EP v0.7 上有 4 个不同的 Kernel 工厂实例，0xd703aae... 是最大的。
              EP v0.6 上的 Kernel 工厂（0xaee9762c... 等）是更老的版本，与 Crossmint 无关。
          conclusion: >
            主网精准归因不可行（bundler 全部为 Pimlico），但 factory 级别归因可用于趋势分析：
            Crossmint 是该工厂实例的主要客户（testnet 67%），主网数据为 Crossmint 活跃度上界。
      notes: >
        Crossmint 底层使用 ZeroDev Kernel + EntryPoint v0.7 + 标准 ECDSA Validator + Pimlico bundler（主网）。
        归因策略：factory 0xd703aae... 作为 Crossmint 活跃度的上界近似（含同工厂的其他 Kernel 客户）。
        该 factory 是 EP v0.7 上最大的 Kernel 实例（OP 94%, ARB 80%），Crossmint 在 testnet 占 67%。
        主网无法按 bundler 区分（全部 Pimlico），精度为 medium。
        适用于：趋势分析、量级估计、跨链偏好分析。不适用于精确用户数统计。
      sources:
        - url: "https://docs.crossmint.com/wallets/architecture"
          description: "确认 ERC-4337 + ERC-7579 架构"
        - url: "https://sepolia.basescan.org/tx/0x430bcd0add8d5b6ef10d2b46c68992c1fd77dc9f005a4dd82bdc5b9b5a2de379"
          description: "钱包部署交易（Base Sepolia Block 38482363）"
        - url: "https://github.com/Jam516/BundleBear/blob/main/models/erc4337/labels/erc4337_labels_factories.sql"
          description: "BundleBear 工厂标签库，确认 0xd703aae... = zerodev_kernel"

    # ----------------------------------------------------------
    # BNB Chain MCP
    # ----------------------------------------------------------
    bnbchain_mcp:
      trackable: false
      architecture: eoa
      reason: "本地 EOA 钱包，无工厂合约。@bnb-chain/mcp 生成本地密钥对，不涉及链上合约部署。"

    # ----------------------------------------------------------
    # MoonPay
    # ----------------------------------------------------------
    moonpay:
      trackable: false
      architecture: hd_wallet
      reason: "HD 钱包架构，链上无工厂合约。MoonPay 使用传统 HD 派生路径生成 EOA 地址。"

    # ----------------------------------------------------------
    # Minara
    # ----------------------------------------------------------
    minara:
      trackable: false
      architecture: custodial
      reason: "托管钱包，链上不可追踪。Minara 通过托管后端管理密钥，无公开链上工厂合约。"

