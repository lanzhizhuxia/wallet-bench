      eip7702:
        impl_address: "0x7702cb554e6bfb442cb743a7df23154544a7176c"
        trackable: true
        confidence: high
        live_accounts: 200248  # BundleBear 2025 年度报告
        transacting_wallets_5plus: 53979  # 5 次以上交易的活跃钱包
        userops_accounts: 190509  # 同时使用 ERC-4337 UserOps 的 7702 账户
        data_as_of: "2025-12"
        source: "BundleBear EIP-7702 2025 Year in Review + eip7702_labels_authorized_contracts.sql"
        verified: true
        verification_details: >
          1. BundleBear eip7702_labels_authorized_contracts.sql 中标注为 "coinbase_wallet"
          2. 地址 0x7702cb55... 含 "7702" 前缀，与 Coinbase 品牌一致
          3. Wintermute Research Dune 看板确认此地址归属 Coinbase Wallet
          4. 该地址为 Coinbase 专属，非共享合约，可确定性归因
        notes: >
          Coinbase Wallet 7702 数据与 ERC-4337 Smart Wallet 数据是并集关系（不重叠）：
          ERC-4337 = 新部署的智能合约钱包（新地址），7702 = 现有 EOA 升级（保留原地址）。
          两者合计才是 Coinbase 的完整链上足迹。
          7702 × 4337 交叉：19 万 Coinbase 7702 账户同时使用了 ERC-4337 UserOps，
          说明 Coinbase 在用 7702 让 EOA 接入 4337 基础设施（bundler/paymaster）。

    # ----------------------------------------------------------
    # Crossmint
    # ----------------------------------------------------------
    crossmint:
      trackable: true  # factory + bundler 组合精准归因，测试网 + 主网均已验证
      architecture: smart_wallet
      underlying_factory: zerodev_kernel
      reason: >
        Crossmint 使用 ZeroDev Kernel 工厂实例 0xd703aae...（EntryPoint v0.7 上最大的 Kernel 工厂）。
        通过 Production API 在 Base mainnet 上创建钱包并发送交易，发现 Crossmint 主网专用 bundler
        0x9d4c1c9e...（Base nonce 642K），反向验证 100% 只使用此 factory（一对一绑定）。
        factory + bundler 组合可在主网精准归因 Crossmint。
      attribution_formula:
        testnet:
          status: verified
          rule: "factory = 0xd703aae... AND tx.from = 0xb052d584..."
          confidence: high
          evidence: >
            Bundler 0xb052d584... 的 87 笔 AccountDeployed 交易中 100% 指向 factory 0xd703aae...。
            该 factory 67.1% 的部署来自此 bundler，22.4% 来自 Pimlico（0x4337...），10.5% 来自 0x858b86e5...。
        mainnet:
          status: verified
          rule: "factory = 0xd703aae... AND tx.from = 0x9d4c1c9e..."
          confidence: high
          evidence: >
            通过 Crossmint Production API 在 Base mainnet 创建钱包 0xe5C499...，发送零值交易
            0xfceabb7e...（Block 43003367），从 receipt 中提取 bundler 0x9d4c1c9e...。
            反向验证：随机抽取 3 笔 AccountDeployed 交易，100% 指向 factory 0xd703aae...（一对一绑定）。
            Bundler 多链活跃：Base nonce 642,342 / Arbitrum 20,974 / Optimism 4,886。
      chains:
        - chain: base-sepolia
          factory_addresses:
            - address: "0xd703aae79538628d27099b8c4f621be4ccd142d5"
              label: zerodev_kernel
              source: "ISSUE-012：wallet-bench 测试钱包反查 + bundler 分析"
