# ============================================================
# 机器人过滤建议
# ============================================================
robot_filter_notes: |
  以下规则用于在 Phase 2 链上数据采集中过滤机器人/测试流量：

  1. 高频 UserOp 过滤：
     - 同一 sender 地址在 1 分钟内发起 > 10 笔 UserOp → 标记为疑似机器人
     - 同一 sender 在 24 小时内发起 > 1000 笔 UserOp → 自动排除

  2. 已知测试/水龙头地址过滤：
     - 来自已知 faucet 合约的 UserOp → 排除
     - sender 地址 ETH 余额来源 100% 为 faucet → 标记

  3. 新合约冷启动过滤：
     - Smart Account 创建后 24 小时内的 UserOp → 标记为可能的测试/部署
     - 但不自动排除（部分正常用户也会立即使用）

  4. 批量空操作过滤：
     - callData 为空或仅包含 0x 的 UserOp → 排除（心跳/探针）
     - 连续相同 callData 的 UserOp（hash 相同）→ 标记

  5. 合约交互模式过滤：
     - 仅与同一目标合约交互且无资金流动的 sender → 标记为可能的自动化脚本

  6. BundleBear 参考：
     - BundleBear Account Activation 数据中的 "wifi_map" 工厂产生大量账户
       （周峰值 36 万），需确认是否与目标供应商相关，否则应排除。

# ============================================================
# 调研总结
# ============================================================
research_summary:
  total_providers: 6
  trackable_providers: 1  # 仅 Coinbase 有可验证的专属工厂地址
  partially_trackable: 1  # Crossmint（使用 ZeroDev Kernel 通用工厂，可追踪但归因不精确）
  not_trackable: 4        # Privy（paymaster 由开发者自配）、BNB Chain MCP、MoonPay、Minara

  key_findings:
    - finding: "Coinbase Smart Wallet 是唯一有完全可验证工厂地址的供应商"
      confidence: high
      details: >
        两个工厂地址（v1.0 和 v1.1）均来自官方 GitHub 仓库，
        在 Etherscan 上已验证源码，BundleBear 社区标签确认归属。

    - finding: "Privy 不部署自有工厂，复用第三方工厂，且 paymaster/bundler 均无法归因"
      confidence: high
      details: >
        Privy 文档明确列出 6 种底层实现供开发者选择，
        链上无法区分 Privy 创建的钱包与直接使用底层 SDK 创建的钱包。
        ISSUE-013 进一步调研确认：paymaster/bundler 由开发者自配（无统一地址），
        Native Gas Sponsorship 地址未公开，两条路径均确认不可行。

    - finding: "Crossmint 使用 ZeroDev Kernel 工厂，链上可部分归因"
      confidence: high
      details: >
        ISSUE-012 通过 wallet-bench 测试钱包反查确认：Crossmint 在 Base Sepolia 使用
        ZeroDev Kernel 工厂 (0xd703aae...) + EntryPoint v0.7 部署 ERC-7579 模块化智能账户。
        BundleBear 标签库已标注该地址为 zerodev_kernel。链上可追踪到 Kernel 工厂级别，
        但无法精确区分 Crossmint 与其他 Kernel 用户。潜在精确归因路径：
        bundler 地址 (0xb052d584...) 或 validator module (0x845adb2c...) 的唯一性验证。

    - finding: "BundleBear 是最权威的 ERC-4337 工厂归因数据源"
      confidence: high
      details: >
        开源项目，维护 59 个已标注工厂地址（22 个供应商），
        提供每周账户激活数据按工厂分组。可直接用于 Phase 2。
