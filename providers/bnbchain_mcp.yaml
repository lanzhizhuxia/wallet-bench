name: BNB Chain MCP
class: local
custody_model: Local
signing_modes: [raw_tx]
submission_mode: client_submit
chains: [bsc, opbnb]
required_secrets: [PRIVATE_KEY]
network_modes:
  testnet: bsc-testnet
  mainnet: bsc  # BLOCKED by safety constraint
viability: ready

# Skill metadata (ISSUE-002)
skill:
  github: https://github.com/bnb-chain/bnb-chain-mcp
  package: "@bnb-chain/mcp"
  package_registry: npm
  integration_type: mcp_server_stdio
  docs_url: https://github.com/bnb-chain/bnb-chain-mcp#readme
  description: "BNB Chain 官方 MCP server，通过 npx 启动，支持 BSC/opBNB 原生代币转账和合约交互"
  stars: ~300
  license: MIT
  last_verified: "2026-03-05"

# Signing governance (ISSUE-002)
governance:
  policy_engine: false
  spend_limit: false
  address_allowlist: false
  human_in_loop: false
  notes: "纯本地方案，私钥由用户自持，无治理层"

# Decision takeaways (ISSUE-002)
takeaways:
  learn: "零注册零配置（只需 PRIVATE_KEY），npx 一键启动，MCP 协议标准化，接入门槛最低"
  avoid: "无独立 API 文档（只能 list_tools() 运行时摸索），参数名非业界惯例（toAddress 而非 to），错误信息是 viem 原始报错未封装"
