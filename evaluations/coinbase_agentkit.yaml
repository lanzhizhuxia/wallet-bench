provider: coinbase_agentkit
evaluator: claude-opus-4.6 (AI agent)
date: "2026-03-05"

summary: |
  Coinbase AgentKit 提供开发工具包，**内置了代币兑换、借贷、领测试币**等常用操作，
  无需从零编写底层逻辑，是六家中 **DeFi 开箱即用能力最强**的方案。
  私钥由 Coinbase 云端安全芯片保管，调用后即时返回结果，错误提示清晰可操作。
  初始配置较繁琐——需要在后台**分三个不同页面获取三组密钥**，找齐后即可正常使用。
  修复 1 个小问题后全部测试通过。
  适合**已有 Coinbase 生态、需要快速上线 DeFi 功能**的团队。

