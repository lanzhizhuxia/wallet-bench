provider: para_wallet
evaluator: claude-opus-4.6 (AI agent)
date: "2026-03-07"

summary: |
  Para Wallet 提供极简 MPC 签名 REST API（仅 3 个端点）。
  支持 EVM/Solana/Cosmos 多链统一接口。sign-raw 接受 hex 数据。
  无 sign_typed_data 支持（需客户端自行哈希）。
  无内置 DeFi 工具——纯签名服务，send_transaction 需客户端自行组装和广播。
  适合需要轻量级 MPC 签名服务的集成方案。

