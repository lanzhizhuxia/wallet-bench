  - "409 Conflict 返回格式与正常响应不一致"

agent_experience: |
  ## 作为 AI Agent 的集成体验

  ### 优点
  - 极简 API（3 个端点），易于理解和集成
  - 多链统一接口（EVM/Solana/Cosmos），代码复用度高
  - MPC 签名安全性高

  ### 痛点
  - 无 sign_typed_data（EIP-712 需客户端哈希）
  - 纯签名服务，send_transaction 需额外实现 RPC 广播
  - 无内置 DeFi 工具

  ### 总体评价
  适合需要轻量级多链签名服务的场景。API 设计简洁但功能有限。
