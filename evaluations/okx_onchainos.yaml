agent_experience: |
  ## 作为 AI Agent 的集成体验

  ### 优点
  - Rust 编写，CLI 响应快速（< 200ms），JSON 输出结构化
  - 5 skill 统一入口，命令结构清晰：`onchainos <skill> <command> [args]`
  - 60+ 链支持，DEX 聚合行情和 Swap 报价覆盖主流链
  - portfolio 命令可查询任意地址的资产总览
  - gateway 模块提供 gas-limit、simulate、broadcast 三步操作

  ### 痛点
  - 不暴露签名原语，无法用于 EIP-191/EIP-712 签名场景
  - 广播交易需要已签名的交易数据，CLI 本身不做签名
  - 需要 3 个环境变量（API Key + Secret + Passphrase），首次配置需访问 OKX 平台

  ### 人类依赖
  - OKX 账户注册和 API Key 创建需人类完成（一次性）
  - 钱包地址需人类提供（OnchainOS 不创建钱包）

  ### 总体评价
  作为"链上操作网关"，OnchainOS 的定位非常明确：提供行情、报价和链上数据查询能力。
  不做密钥托管也不做签名，与 BNB Chain MCP 的"签名+提交一体化"模式互补。
  适合 Agent 需要跨链查询、比价、获取 Swap 报价但使用自己签名方案的场景。

agent_memo: |
  ## OKX OnchainOS — Agent 集成速查表

  ### 安装
  ```bash
  curl -sSL https://raw.githubusercontent.com/okx/onchainos-skills/main/install.sh | sh
  ```

  ### 环境变量
  ```bash
  export OKX_API_KEY=your_api_key
  export OKX_SECRET_KEY=your_secret_key
  export OKX_PASSPHRASE=your_passphrase
  ```

  ### 5 个 Skill
  1. **portfolio** — 资产查询：`onchainos portfolio total-value --address <addr> --chain-index 1`
  2. **dex** — DEX 行情：`onchainos dex supported-chains`
  3. **swap** — Swap 操作：`onchainos swap quote --from USDC --to USDT --amount 1 --chain-index 1`
  4. **token** — 代币搜索：`onchainos token search --keyword USDC`
  5. **gateway** — 链上网关：`onchainos gateway gas-limit --to <addr> --chain-index 1`

  ### 常用 chain-index
  - 1=Ethereum, 56=BSC, 137=Polygon, 42161=Arbitrum, 10=Optimism
  - 8453=Base, 43114=Avalanche, 250=Fantom, 501=Solana

  ### 已知限制
  1. 无 sign_message / sign_typed_data — 不做签名
  2. 无 create_wallet — 用户自行提供地址
  3. broadcast 需要已签名交易数据（raw tx hex）
  4. API 调用受 OKX 平台配额限制
