provider: okx_onchainos
evaluator: claude-opus-4.6 (AI agent)
date: "2026-03-07"

summary: |
  OKX OnchainOS 是一个**本地 Rust CLI 工具**，覆盖面在所有 provider 中最广（60+ 链），
  提供 5 个 skill / 34 个命令——Portfolio 查询、DEX 行情、Swap 报价、代币搜索、链上网关。
  定位为**链上操作网关**，与 BNB Chain MCP 同层但能力面更广（DEX 聚合、行情数据）。
  **不提供签名原语**（sign_message / sign_typed_data），也不托管密钥——用户自持地址和 API Key。
  内置 swap quote/swap 命令，可做 DEX 聚合级别的 Token Swap。
  gateway 模块提供 gas 预估、交易模拟和广播功能。
  适合需要**广链覆盖 + DEX 聚合行情 + Swap 报价**的 Agent 场景。

