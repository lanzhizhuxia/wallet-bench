agent_experience: |
  ## 作为 AI Agent 的集成体验

  ### 优点
  - 安装简单（`npm install -g minara`），登录后即可使用
  - `account` 命令返回所有链的钱包地址
  - 内置 swap / perps / transfer 等高层命令，无需编写底层逻辑

  ### 痛点
  - `--json` flag 不生效（仍输出格式化文本），需要正则解析输出
  - transfer 命令的 token 匹配会弹出交互式选择器，在自动化场景下会挂住
  - 不暴露签名原语，无法用于自定义签名场景

  ### 人类依赖
  - 注册账号需人类完成（一次性），之后 AI 完全自主

  ### 总体评价
  作为"一站式 DeFi 助手"，swap / perps / transfer 能力在六家中最全面。但底层签名能力几乎为零，适合不需要密钥控制的轻量场景。

agent_memo: |
  ## Minara AI — Agent 集成速查表

  ### 安装与登录
  ```bash
  npm install -g minara
  minara login          # 浏览器 email 验证
  minara account        # 查看钱包地址
  ```

  ### 核心操作
  - 查看地址: `minara account` 或 `minara deposit spot`
  - 查看余额: `minara balance`
  - 转账: `minara transfer -c <chain> -t <token_addr> -a <amount> --to <addr> -y`
  - Swap: `minara swap -s <buy|sell> -t '<token>' -a <amount> -y`
  - 永续合约: `minara perps order`

  ### 已知限制
  1. 无 sign_message / sign_typed_data — custodial wallet 不暴露签名
  2. --json 不输出 JSON — 需要文本正则解析
  3. token ticker 匹配会弹出交互式选择器 — 使用合约地址避免
  4. 无 create_wallet — 钱包在注册时自动创建
  5. 余额为零时 transfer 会返回错误（expected）

  ### 钱包地址
  - EVM: 所有 EVM 链共享同一个 abstraction-evm 地址
  - Solana: 独立的 abstraction-solana 地址
  - 类型: custodial smart wallet

  ### 性能数据（本机实测）
  - 获取地址 (account): ~250ms
  - 转账尝试 (transfer): ~700ms
  - 并发 3 ops: ~300ms
