provider: minara
evaluator: claude-opus-4.6 (AI agent)
date: "2026-03-05"

summary: |
  Minara AI 采用**全托管模式**——私钥由平台保管，用户无需也无法自行管理密钥。
  内置代币兑换、转账、合约交易等常用操作，注册即自动创建钱包，**上手最简单**。
  内置交易确认流程，每笔操作前可人工审核，也可设为自动跳过。
  但**不提供底层签名能力**，无法用于需要自定义签名的高级场景；
  借贷、永续合约、预测市场等复杂 DeFi 操作均不可行。
  测试通过 8 项，跳过 5 项（因架构不支持），无故障。
  适合**对密钥控制无要求、只需简单兑换和转账**的轻量场景。

scores:
  onboarding_ease: 4          # 1-5, 1=极难上手 5=零摩擦
  doc_quality: 3               # 1-5, 1=严重误导 5=完美
