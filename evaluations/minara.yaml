  error_message_quality: 3     # 1-5, 1=不可读 5=清晰可操作
  agent_autonomy: 3            # 1-5, 1=完全依赖人类 5=全自主
  time_to_first_success_min: 8
  # --- ISSUE-008 新增评分 (e01-e06) ---
  governance_completeness: 3   # e01, 1-5. Per-workflow risk rules (TP/SL, sizing caps) in UI builder, 无 API-level policy engine
  network_environment: 2       # e02, 1-5. 消费级产品, 无开发者 testnet 环境
  sdk_doc_quality: 3           # e03, 1-5. 文档基本可用, 需试错, 无 llms.txt
  app_tool_coverage: 3         # t27, 1-5. CLI 提供 swap/transfer/perps/deposit, 约 10+ 工具
  app_execution_quality: 3     # e04, 1-5. 可靠执行, 无滑点优化或 MEV 保护
