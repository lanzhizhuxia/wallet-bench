provider: universal_trading
evaluator: gpt-5.3-codex (AI agent)
date: "2026-03-07"

summary: |
  Universal Trading (Particle Network) 通过本地 TypeScript 脚本执行交易流程，适合快速接入多链买卖样例。
  架构为本地私钥模式，create_wallet 可复用 .env 既有地址或执行初始化脚本。
  目前不暴露 sign_message / sign_typed_data，通用 send_transaction 仅能 best-effort 映射到示例脚本。
  适合脚本化交易与 PoC，不适合需要完整签名原语或通用交易构造的场景。

