  - "Zodiac Roles 权限配置未有文档说明"
  - "仅 Base 主网，无测试网支持"

agent_experience: |
  ## 作为 AI Agent 的集成体验

  ### 优点
  - 链上策略执行（Zodiac Roles），Agent 行为受合约约束
  - 内置 KyberSwap/CoW Protocol Swap 脚本
  - Gnosis Safe 多签架构提供安全保障

  ### 痛点
  - 无签名原语（personal_sign/sign_typed_data）
  - 仅 Base 主网，无测试网环境
  - 需要预部署 Safe 和配置 Zodiac Roles

  ### 总体评价
  适合需要链上治理约束的 Base 生态 Agent。独特的 Zodiac Roles 策略执行是差异化优势。
