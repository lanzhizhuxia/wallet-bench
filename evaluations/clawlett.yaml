provider: clawlett
evaluator: claude-opus-4.6 (AI agent)
date: "2026-03-07"

summary: |
  Clawlett 基于 Gnosis Safe + Zodiac Roles，是唯一采用智能合约账户的供应商。
  链上策略执行（Zodiac Roles 限制 Agent 可调用的合约和方法）是独有亮点。
  内置 KyberSwap/CoW Protocol Swap。仅支持 Base 主网。
  无 personal_sign 或 sign_typed_data——Zodiac Roles 仅允许交易级操作。
  适合需要链上治理约束的 Base 生态 Agent。

