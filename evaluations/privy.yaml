provider: privy
evaluator: claude-opus-4.6 (AI agent)
date: "2026-03-05"

summary: |
  Privy 提供云端钱包托管服务，私钥存放在**独立安全芯片**中，安全等级高。
  接口功能覆盖完整——签名、转账、策略管控、密钥导出一应俱全，无需额外安装包，
  直接通过标准网络请求即可调用。集成过程中遇到 4 个接口细节问题，修复后**全部测试通过**。

  Privy 是本次评测中**唯一内建「风控策略引擎」**的方案——可以设置转账金额上限、
  多人审批、合约调用白名单等规则。如果业务需要 AI 自动执行交易但又必须有审批把关，
  这是目前**唯一开箱即用的选项**。

