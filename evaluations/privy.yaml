integration_bugs:
  - id: BUG-1
    description: "urllib.request 被 Cloudflare 403 拦截（error code 1010），必须用 requests 库 + User-Agent"
    root_cause: provider_infra
    fix_time_min: 5
    lesson: "Privy API 有 Cloudflare bot protection，Python stdlib urllib 会被拦截。必须使用 requests 库并设置 User-Agent header"

  - id: BUG-2
    description: "caip2 参数在 personal_sign/eth_signTypedData_v4 中会报 Unrecognized key，但在 eth_sendTransaction 中是必需的"
    root_cause: provider_api
    fix_time_min: 3
    lesson: "Privy RPC endpoint 对 caip2 的要求因 method 而异——签名不需要，交易必须带。文档未明确区分"

  - id: BUG-3
    description: "EIP-712 typed data 的 primaryType 必须写成 snake_case 的 primary_type"
    root_cause: provider_api
    fix_time_min: 2
    lesson: "Privy 全面使用 snake_case（非 camelCase），包括 EIP-712 的 primary_type。与 EIP-712 标准的 primaryType 不同"

  - id: BUG-4
    description: "eth_sendTransaction 的 chainId 必须放在请求体根部的 caip2 字段，不能放在 transaction 对象内"
    root_cause: provider_api
    fix_time_min: 2
    lesson: "Privy 用 CAIP-2 格式指定链（如 eip155:11155111），放在 RPC 请求根部而非 transaction 内部"

doc_gaps:
