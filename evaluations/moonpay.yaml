provider: moonpay
evaluator: claude-opus-4.6 (AI agent)
date: "2026-03-05"

summary: |
  MoonPay Agents 是**私钥不出本机**的方案，密钥加密存储在操作系统安全区，用户完全掌控。
  提供 **54 个工具**和 17 个 AI 技能，支持 **10 条主流区块链**，工具数量在六家中最多。
  命令行输出格式对 AI 友好，还可一键启动标准化服务接口。
  关键限制：所有交易接口都是高层封装，**无法构建自定义合约调用**——
  导致 Uniswap 兑换和借贷协议直接不可行。
  集成过程中发现 3 个适配问题，修复后全部测试通过。
  适合**标准转账、跨链桥、聚合器兑换**等不需要底层合约交互的场景。

