doc_gaps:
  - "CLI 支持的链列表在文档中散布于多处，无统一表格"
  - "transaction sign 需要 base64 编码的 RLP 交易，但文档未说明如何构建 RLP"
  - "无 EIP-712 signTypedData 支持，文档未明确说明此限制"

agent_experience: |
  ## 作为 AI Agent 的集成体验

  ### 优点
  - npm 全局安装后即可使用，`--json` flag 让所有命令输出结构化 JSON，非常适合 AI agent 消费
  - `wallet create` 一步生成 10 链地址，无需分链操作
  - 签名支持 EIP-191 和 ed25519（Solana），覆盖面广

  ### 痛点
  - 注册需 hCaptcha 验证，AI 无法自主完成
  - 缺少 EIP-712 结构化签名支持
  - token transfer 是高层封装（build+sign+broadcast 一体化），无法构建自定义 calldata 裸交易

  ### 人类依赖
  - 注册账号需人类完成 hCaptcha（一次性），之后 AI 完全自主

  ### 总体评价
  CLI 工具链丰富（54 工具 / 10 链），输出格式对 AI 友好。与 BNB Chain MCP 相比，MoonPay 支持签名、覆盖更多链（10 vs 2），且有完整 DeFi 工具链。延迟略高（CLI subprocess 开销），但仍在秒级。

agent_memo: |
  ## MoonPay Agents — Agent 集成速查表

  ### 安装与认证
  ```bash
  npm install -g @moonpay/cli
  mp consent accept
  mp login --email <email>    # 需人工浏览器 hCaptcha
  mp verify --email <email> --code <code>
  mp wallet create --name bench
  ```

  ### 核心操作（全部支持 --json）
  - 创建钱包: `mp wallet create --name <name> --json`
  - 查看钱包: `mp wallet retrieve --wallet <name> --json`
  - 签名消息: `mp message sign --wallet <name> --chain <chain> --message <msg> --json`
  - 转账: `mp token transfer --wallet <name> --chain <chain> --token <addr> --amount <amt> --to <addr> --json`
  - Swap: `mp token swap --wallet <name> --chain <chain> --from <token> --to <token> --amount <amt> --json`

  ### 链名映射
  CLI 链名: ethereum, base, polygon, arbitrum, optimism, bnb, avalanche, solana, bitcoin, tron
  EVM 链共享同一地址。Solana/Bitcoin/TRON 各自独立地址。

  ### 原生代币地址
  - EVM: 0x0000000000000000000000000000000000000000
  - Solana: So11111111111111111111111111111111111111111

  ### 已知限制
  1. 无 EIP-712 signTypedData — sign_typed_data 必须标记 N/A
  2. token transfer --amount 0 会报错 "Amount must be greater than zero"
  3. transaction sign 需要预构建的 base64 编码交易（RLP/VersionedTransaction/PSBT）
  4. wallet create 每次生成新 HD 钱包（新助记词），不是从同一 seed 派生
  5. hCaptcha 登录是一次性的，credentials 自动持久化在 ~/.config/moonpay/

  ### 性能数据（本机实测）
  - 钱包创建: ~800ms (CLI subprocess 开销)
  - 消息签名: ~850ms
  - 转账（含 build+sign+broadcast）: ~4000ms
  - 并发 3 ops: ~1000ms
